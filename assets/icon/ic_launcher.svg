<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="6" stdDeviation="5" flood-opacity="0.2"/>
        </filter>
        <radialGradient id="grad" cx="50%" cy="30%" r="75%">
            <stop offset="0%" stop-color="#26A69A" />
            <stop offset="100%" stop-color="#00695C" />
        </radialGradient>
        <pattern id="tiles" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
            <rect x="2" y="2" width="60" height="60" rx="4" fill="#FFF" opacity="0.06"/>
        </pattern>
    </defs>

    <!-- Background -->
    <rect width="512" height="512" fill="url(#grad)" />
    <rect width="512" height="512" fill="url(#tiles)" />

    <!-- Kitchen Shelf -->
    <rect x="36" y="140" width="440" height="20" rx="8" fill="#5D4037" />
    <rect x="36" y="140" width="440" height="6" rx="3" fill="#795548" />

    <!-- Jar 1: Tall yellow spice jar -->
    <rect x="60" y="50" width="45" height="90" rx="8" fill="#FFF" opacity="0.7" />
    <rect x="62" y="80" width="41" height="58" rx="6" fill="#FFF9C4" />

    <!-- Jar 2: Short red jar -->
    <rect x="120" y="80" width="50" height="60" rx="8" fill="#FFF" opacity="0.7" />
    <rect x="122" y="105" width="46" height="33" rx="6" fill="#FF7043" />

    <!-- Jar 3: Masala pouch shape -->
    <path d="M 195 90 Q 230 110 265 90 L 255 60 L 205 60 Z" fill="#FFF8E1" />
    <path d="M 200 50 L 260 50 L 270 70 L 190 70 Z" fill="#E53935" />

    <!-- Jar 4: Steel container -->
    <rect x="290" y="95" width="70" height="45" rx="4" fill="#CFD8DC" />
    <rect x="285" y="85" width="80" height="10" rx="3" fill="#90A4AE" />

    <!-- Jar 5: Green jar -->
    <rect x="380" y="70" width="45" height="70" rx="8" fill="#FFF" opacity="0.7" />
    <rect x="382" y="90" width="41" height="48" rx="6" fill="#81C784" />

    <!-- Character: Amma Body -->
    <!-- Yellow saree base -->
    <path d="M 120 512 L 120 380 C 120 320, 392 320, 392 380 L 392 512 Z" fill="#FFCA28" />
    <!-- Red saree drape left -->
    <path d="M 110 512 C 110 380, 160 350, 220 350 C 260 350, 280 400, 280 512 Z" fill="#B71C1C" />
    <!-- Red saree drape right -->
    <path d="M 170 512 C 170 420, 230 350, 300 340 C 360 330, 400 380, 400 512 Z" fill="#D32F2F" filter="url(#drop)" />

    <!-- Hair & Face -->
    <circle cx="256" cy="250" r="75" fill="#212121" />
    <circle cx="256" cy="260" r="65" fill="#E09E73" />
    <!-- Hair bun -->
    <path d="M 256 175 C 200 175, 175 210, 180 275 C 190 230, 220 205, 256 210 C 292 205, 322 230, 332 275 C 337 210, 312 175, 256 175 Z" fill="#212121" />
    <!-- Hair bun circle -->
    <circle cx="345" cy="230" r="35" fill="#212121" />
    <!-- Bindi -->
    <circle cx="256" cy="232" r="6" fill="#D32F2F" />

    <!-- Kawaii Eyes (curved arcs) -->
    <path d="M 214 255 Q 222 248 230 255" fill="none" stroke="#3E2723" stroke-width="4" stroke-linecap="round" />
    <path d="M 282 255 Q 290 248 298 255" fill="none" stroke="#3E2723" stroke-width="4" stroke-linecap="round" />

    <!-- Smile -->
    <path d="M 240 290 Q 256 305 272 290" fill="none" stroke="#3E2723" stroke-width="4" stroke-linecap="round" />

    <!-- Blush cheeks -->
    <circle cx="205" cy="275" r="10" fill="#F48FB1" opacity="0.6" />
    <circle cx="307" cy="275" r="10" fill="#F48FB1" opacity="0.6" />

    <!-- Tablet in hands -->
    <g filter="url(#drop)">
        <rect x="176" y="380" width="160" height="120" rx="12" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="4" />
        <rect x="186" y="395" width="140" height="95" rx="6" fill="#FFF" />
        <!-- Tablet header bar -->
        <rect x="186" y="395" width="140" height="28" fill="#00897B" />
        <!-- Tablet content: list items -->
        <rect x="196" y="435" width="14" height="14" rx="3" fill="#4CAF50" />
        <rect x="220" y="439" width="90" height="6" rx="3" fill="#CFD8DC" />
        <rect x="196" y="460" width="14" height="14" rx="3" fill="#FF7043" />
        <rect x="220" y="464" width="70" height="6" rx="3" fill="#CFD8DC" />
    </g>

    <!-- Hands -->
    <rect x="166" y="430" width="24" height="14" rx="7" fill="#E09E73" />
    <rect x="322" y="430" width="24" height="14" rx="7" fill="#E09E73" />
</svg>
