name: ammas_kitchen
description: "Kitchen inventory app for Amma - snap, track, never waste food"
publish_to: 'none'
version: 0.2.1+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.4.2
  path: ^1.9.1

  # State Management
  provider: ^6.1.4

  # Camera & Image
  image_picker: ^1.1.2
  path_provider: ^2.1.5

  # Google ML Kit
  google_mlkit_image_labeling: ^0.14.0
  google_mlkit_text_recognition: ^0.15.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Networking (for OTA updates)
  http: ^1.6.0

  # UI Helpers
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
